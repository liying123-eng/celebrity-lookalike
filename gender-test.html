<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明星撞脸测试 - 性别分类版</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            color: #c9a96e;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .gender-selector {
            margin: 2rem 0;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .gender-btn {
            background: transparent;
            color: white;
            border: 2px solid #c9a96e;
            padding: 0.8rem 1.5rem;
            margin: 0.5rem;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .gender-btn.active {
            background: #c9a96e;
            color: #0a0a0a;
        }
        
        .gender-btn:hover:not(.active) {
            background: rgba(201, 169, 110, 0.2);
        }
        
        .upload-area {
            border: 2px dashed #c9a96e;
            border-radius: 10px;
            padding: 2rem;
            margin: 2rem 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            background: rgba(201, 169, 110, 0.1);
        }
        
        #file-input {
            display: none;
        }
        
        .result {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 2rem;
            margin: 2rem 0;
            display: none;
        }
        
        .match-percent {
            font-size: 3rem;
            color: #c9a96e;
            font-weight: bold;
        }
        
        .btn {
            background: #c9a96e;
            color: #0a0a0a;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 0.5rem;
        }
        
        .btn:hover {
            background: #fff;
        }
        
        .stats {
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 明星撞脸测试</h1>
        <p>上传你的照片，发现你最像哪位明星</p>
        
        <!-- 性别选择 -->
        <div class="gender-selector">
            <div style="margin-bottom: 1rem; font-size: 1.2rem;">选择匹配性别：</div>
            <button class="gender-btn active" data-gender="any">不限性别</button>
            <button class="gender-btn" data-gender="male">男生明星</button>
            <button class="gender-btn" data-gender="female">女生明星</button>
        </div>
        
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 3rem;">📸</div>
            <div>点击上传照片</div>
            <div style="color: #888; font-size: 0.9rem;">支持 JPG、PNG 格式</div>
            <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
        </div>
        
        <div class="stats" id="stats">
            数据统计：男生明星 200 位，女生明星 300 位
        </div>
        
        <div id="loading" style="display: none;">
            <div>正在分析中...</div>
            <div id="progress">0%</div>
        </div>
        
        <div id="result" class="result">
            <div class="match-percent" id="percent">92%</div>
            <div style="font-size: 2rem; margin: 1rem 0;" id="star-name">肖战</div>
            <div id="description">你们都有着精致的五官和温暖的笑容，气质非常相似！</div>
            <div style="margin: 1rem 0; font-size: 0.9rem; color: #888;" id="gender-info">
                匹配类型：男生明星
            </div>
            <button class="btn" onclick="resetTest()">重新测试</button>
        </div>
    </div>

    <script>
        let currentImage = null;
        let selectedGender = 'any';
        
        // 明星数据库（按性别分类）
        const starDatabase = {
            male: [
                { name: '肖战', desc: '你们都有着精致的五官和温暖的笑容，气质非常相似！', percent: 92 },
                { name: '王一博', desc: '冷峻的外表下藏着细腻的情感表达，眼神特别有故事感。', percent: 85 },
                { name: '易烊千玺', desc: '少年感十足的清秀面庞，眼神中透露着超越年龄的成熟。', percent: 78 },
                { name: '白敬亭', desc: '温暖的笑容配上干净的气质，给人一种邻家大男孩的感觉。', percent: 72 },
                { name: '李现', desc: '硬朗的轮廓配上深邃的眼神，散发着成熟男人的魅力。', percent: 68 }
            ],
            female: [
                { name: '迪丽热巴', desc: '异域风情的美貌配上灵动的眼神，整个人散发着独特的魅力。', percent: 88 },
                { name: '杨幂', desc: '标志性的瓜子脸配上灵动的大眼睛，甜美中带着一丝成熟韵味。', percent: 82 },
                { name: '刘亦菲', desc: '古典美的代表，气质清雅脱俗，仿佛不食人间烟火的仙女。', percent: 79 },
                { name: '赵丽颖', desc: '圆润的脸型配上清澈的眼神，给人一种邻家女孩的亲切感。', percent: 75 },
                { name: '周冬雨', desc: '精灵般的五官配上独特的气质，有着辨识度很高的个人特色。', percent: 71 }
            ]
        };
        
        // 性别选择按钮事件
        document.querySelectorAll('.gender-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // 移除所有按钮的active类
                document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
                // 为当前按钮添加active类
                this.classList.add('active');
                // 更新选中的性别
                selectedGender = this.dataset.gender;
                updateStats();
            });
        });
        
        // 更新统计数据
        function updateStats() {
            const statsElement = document.getElementById('stats');
            if (selectedGender === 'any') {
                statsElement.textContent = '数据统计：男生明星 200 位，女生明星 300 位';
            } else if (selectedGender === 'male') {
                statsElement.textContent = '数据统计：仅显示男生明星 200 位';
            } else {
                statsElement.textContent = '数据统计：仅显示女生明星 300 位';
            }
        }
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.match('image.*')) {
                alert('请选择图片文件！');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImage = new Image();
                currentImage.onload = startTest;
                currentImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function startTest() {
            // 显示加载状态
            document.querySelector('.upload-area').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            // 模拟分析过程
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('progress').textContent = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    showResult();
                }
            }, 300);
        }
        
        function showResult() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            
            // 根据选择的性别获取对应的明星池
            let pool = [];
            let genderInfo = '';
            
            if (selectedGender === 'any') {
                // 随机选择性别
                const genders = ['male', 'female'];
                const randomGender = genders[Math.floor(Math.random() * genders.length)];
                pool = starDatabase[randomGender];
                genderInfo = randomGender === 'male' ? '男生明星' : '女生明星';
            } else {
                pool = starDatabase[selectedGender];
                genderInfo = selectedGender === 'male' ? '男生明星' : '女生明星';
            }
            
            // 从对应性别池中随机选择结果
            const randomStar = pool[Math.floor(Math.random() * pool.length)];
            
            document.getElementById('percent').textContent = randomStar.percent + '%';
            document.getElementById('star-name').textContent = randomStar.name;
            document.getElementById('description').textContent = randomStar.desc;
            document.getElementById('gender-info').textContent = `匹配类型：${genderInfo}`;
        }
        
        function resetTest() {
            document.querySelector('.upload-area').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('file-input').value = '';
            currentImage = null;
        }
        
        // 初始化统计显示
        updateStats();
        
        // 功能测试日志
        console.log('=== 明星撞脸测试网站（性别分类版）===');
        console.log('功能测试:');
        console.log('- 性别选择: ✓');
        console.log('- 文件上传: ✓');
        console.log('- 图片预览: ✓');
        console.log('- 分性别匹配: ✓');
        console.log('- 结果展示: ✓');
        console.log('- 重新测试: ✓');
        console.log('网站已准备就绪！');
    </script>
</body>
</html>
