<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明星撞脸测试 - GitHub Pages版本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #ddd;
            margin-bottom: 2rem;
        }

        .gender-selector {
            margin: 2rem 0;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .gender-btn {
            background: transparent;
            color: white;
            border: 2px solid #ffd700;
            padding: 0.8rem 1.2rem;
            margin: 0.3rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .gender-btn.active {
            background: #ffd700;
            color: black;
        }

        .gender-btn:hover:not(.active) {
            background: rgba(255, 215, 0, 0.2);
        }

        .upload-area {
            border: 2px dashed #ffd700;
            border-radius: 15px;
            padding: 2rem;
            margin: 2rem 0;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        .upload-area:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateY(-5px);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            color: #aaa;
            font-size: 0.8rem;
        }

        #file-input {
            display: none;
        }

        .scan-container {
            display: none;
            margin: 2rem 0;
        }

        .user-photo {
            max-width: 250px;
            border-radius: 12px;
            margin-bottom: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .scan-line {
            height: 3px;
            background: #ffd700;
            box-shadow: 0 0 15px #ffd700;
            animation: scan 2s infinite linear;
            margin: 1rem auto;
            width: 80%;
            border-radius: 2px;
        }

        @keyframes scan {
            0% { transform: translateY(-50px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(50px); opacity: 0; }
        }

        .progress-text {
            font-size: 1rem;
            color: #ffd700;
            margin: 1rem 0;
        }

        .results-container {
            display: none;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            margin: 1rem 0;
        }

        .match-percent {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            margin: 1rem 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .star-name {
            font-size: 2rem;
            margin: 1rem 0;
        }

        .star-desc {
            color: #ddd;
            font-size: 1rem;
            line-height: 1.6;
            margin: 1rem 0;
        }

        .result-label {
            font-size: 1rem;
            color: #ffd700;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .features-section {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .section-title {
            font-size: 1.1rem;
            color: #ffd700;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .features-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1rem;
            text-align: left;
        }

        .feature-icon {
            font-size: 1.5rem;
            margin-right: 1rem;
            width: 40px;
            text-align: center;
        }

        .feature-info {
            flex: 1;
        }

        .feature-name {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 0.3rem;
        }

        .feature-desc {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.4;
        }

        .feature-percent {
            font-size: 1.2rem;
            color: #ffd700;
            font-weight: bold;
            margin-left: 1rem;
        }

        .other-section {
            margin: 1.5rem 0;
        }

        .other-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .small-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s;
        }

        .small-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }

        .small-percent {
            font-size: 1.5rem;
            color: #ffd700;
            font-weight: bold;
        }

        .small-name {
            font-size: 1rem;
            margin: 0.5rem 0;
        }

        .btn {
            background: #ffd700;
            color: black;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 0.5rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .other-results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="home">
            <h1>🌟 明星撞脸测试</h1>
            <p class="subtitle">上传照片，发现你的明星脸</p>
            
            <div class="gender-selector">
                <div style="margin-bottom: 1rem;">选择匹配性别：</div>
                <button class="gender-btn active" data-gender="any">不限</button>
                <button class="gender-btn" data-gender="male">男生</button>
                <button class="gender-btn" data-gender="female">女生</button>
            </div>
            
            <div class="upload-area" id="upload-area">
                <div class="upload-icon">📸</div>
                <div class="upload-text">点击上传照片</div>
                <div class="upload-hint">支持 JPG/PNG 格式</div>
                <input type="file" id="file-input" accept="image/*">
            </div>
        </div>

        <!-- 分析页面 -->
        <div id="analyzing" class="scan-container">
            <img id="preview" class="user-photo" alt="预览">
            <div class="scan-line"></div>
            <div class="progress-text" id="progress">正在分析中...</div>
        </div>

        <!-- 结果页面 -->
        <div id="results" class="results-container">
            <!-- 整体结果 -->
            <div class="result-card main-result">
                <div class="result-label">🎯 最像明星</div>
                <div class="match-percent" id="percent">92%</div>
                <div class="star-name" id="name">肖战</div>
                <div class="star-desc" id="overall">整体相似度高达92%，你们都有着精致的五官轮廓！</div>
            </div>
            
            <!-- 部位分析 -->
            <div class="features-section">
                <div class="section-title">📊 五官相似度分析</div>
                <div class="features-list" id="features">
                    <!-- 部位分析结果 -->
                </div>
            </div>
            
            <!-- 其他可能 -->
            <div class="other-section">
                <div class="section-title">✨ 其他相似明星</div>
                <div class="other-results" id="others">
                    <!-- 其他结果 -->
                </div>
            </div>
            
            <button class="btn" id="retry">重新测试</button>
        </div>
    </div>

    <script>
        // 全局变量
        let selectedGender = 'any';
        let currentImage = null;
        
        // 明星数据库 - 包含部位分析
        const stars = {
            male: [
                { 
                    name: '肖战', 
                    overall: '整体相似度高达92%，你们都有着精致的五官轮廓！',
                    features: [
                        { part: '眼睛', desc: '瑞凤眼型，眼尾微微上扬，眼神清澈温柔', similarity: 95 },
                        { part: '鼻子', desc: '鼻梁高挺，鼻翼精致，侧脸线条优美', similarity: 88 },
                        { part: '嘴唇', desc: '唇形饱满，嘴角自然上扬，笑容温暖', similarity: 90 },
                        { part: '脸型', desc: '瓜子脸型，下颌线条流畅，上镜效果好', similarity: 93 }
                    ],
                    percent: 92 
                },
                { 
                    name: '王一博', 
                    overall: '整体相似度85%，冷峻气质与细腻情感并存！',
                    features: [
                        { part: '眼睛', desc: '单眼皮，眼型狭长，眼神深邃有故事感', similarity: 90 },
                        { part: '鼻子', desc: '鼻梁直挺，鼻尖微翘，立体感强', similarity: 85 },
                        { part: '嘴唇', desc: '薄唇，唇线清晰，表情冷峻时更有魅力', similarity: 82 },
                        { part: '脸型', desc: '轮廓分明，下颌角明显，有男人味', similarity: 88 }
                    ],
                    percent: 85 
                },
                { 
                    name: '易烊千玺', 
                    overall: '整体相似度78%，少年感与成熟气质兼具！',
                    features: [
                        { part: '眼睛', desc: '内双，眼神坚定，有超越年龄的沉稳', similarity: 80 },
                        { part: '鼻子', desc: '鼻型端正，山根适中，面部协调', similarity: 78 },
                        { part: '嘴唇', desc: '唇形偏薄，嘴角下垂时显成熟', similarity: 75 },
                        { part: '脸型', desc: '方中带圆，轮廓硬朗，有辨识度', similarity: 82 }
                    ],
                    percent: 78 
                },
                { 
                    name: '白敬亭', 
                    overall: '整体相似度72%，干净清爽，邻家大男孩气质！',
                    features: [
                        { part: '眼睛', desc: '双眼皮，眼型圆润，眼神纯真', similarity: 75 },
                        { part: '鼻子', desc: '鼻梁适中，鼻头圆润，亲和力十足', similarity: 70 },
                        { part: '嘴唇', desc: '唇形饱满，笑容阳光，有感染力', similarity: 73 },
                        { part: '脸型', desc: '鹅蛋脸型，线条柔和，少年感强', similarity: 74 }
                    ],
                    percent: 72 
                }
            ],
            female: [
                { 
                    name: '迪丽热巴', 
                    overall: '整体相似度88%，异域风情，独特魅力！',
                    features: [
                        { part: '眼睛', desc: '大眼深邃，双眼皮明显，眼神灵动', similarity: 92 },
                        { part: '鼻子', desc: '鼻梁高挺，鼻尖精致，侧颜立体', similarity: 90 },
                        { part: '嘴唇', desc: '唇形饱满，唇珠明显，性感迷人', similarity: 85 },
                        { part: '脸型', desc: '瓜子脸型，下颌线条柔和，上镜', similarity: 88 }
                    ],
                    percent: 88 
                },
                { 
                    name: '杨幂', 
                    overall: '整体相似度82%，灵动大眼，甜美成熟！',
                    features: [
                        { part: '眼睛', desc: '狐狸眼型，眼尾上扬，灵动有神', similarity: 90 },
                        { part: '鼻子', desc: '鼻梁高挺，鼻尖微翘，精致小巧', similarity: 85 },
                        { part: '嘴唇', desc: '唇形饱满，嘴角上扬，笑容甜美', similarity: 80 },
                        { part: '脸型', desc: '瓜子脸型，下颌尖细，显年轻', similarity: 78 }
                    ],
                    percent: 82 
                },
                { 
                    name: '刘亦菲', 
                    overall: '整体相似度79%，古典美人，仙女气质！',
                    features: [
                        { part: '眼睛', desc: '丹凤眼型，眼型修长，眼神清冷', similarity: 82 },
                        { part: '鼻子', desc: '鼻梁挺直，鼻头圆润，古典美', similarity: 80 },
                        { part: '嘴唇', desc: '唇形小巧，唇珠饱满，气质优雅', similarity: 78 },
                        { part: '脸型', desc: '鹅蛋脸型，线条流畅，骨相好', similarity: 85 }
                    ],
                    percent: 79 
                },
                { 
                    name: '赵丽颖', 
                    overall: '整体相似度75%，圆润可爱，邻家女孩！',
                    features: [
                        { part: '眼睛', desc: '圆眼大而有神，眼神清澈，亲切感', similarity: 80 },
                        { part: '鼻子', desc: '鼻梁适中，鼻头圆润，可爱型', similarity: 75 },
                        { part: '嘴唇', desc: '唇形小巧，嘴角上扬，笑容甜美', similarity: 78 },
                        { part: '脸型', desc: '圆脸，苹果肌饱满，显年轻', similarity: 72 }
                    ],
                    percent: 75 
                }
            ]
        };

        // DOM元素
        const home = document.getElementById('home');
        const analyzing = document.getElementById('analyzing');
        const results = document.getElementById('results');
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const progress = document.getElementById('progress');
        const percent = document.getElementById('percent');
        const name = document.getElementById('name');
        const overall = document.getElementById('overall');
        const features = document.getElementById('features');
        const others = document.getElementById('others');
        const retry = document.getElementById('retry');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 性别选择
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedGender = btn.dataset.gender;
                });
            });

            // 上传功能
            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFile);
            
            // 拖拽上传
            uploadArea.addEventListener('dragover', e => {
                e.preventDefault();
                uploadArea.style.background = 'rgba(255, 215, 0, 0.2)';
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = '';
            });
            
            uploadArea.addEventListener('drop', e => {
                e.preventDefault();
                uploadArea.style.background = '';
                if (e.dataTransfer.files.length > 0) {
                    handleImage(e.dataTransfer.files[0]);
                }
            });

            // 重新测试
            retry.addEventListener('click', () => {
                home.style.display = 'block';
                analyzing.style.display = 'none';
                results.style.display = 'none';
                fileInput.value = '';
                currentImage = null;
            });
        });

        function handleFile(e) {
            if (e.target.files.length > 0) {
                handleImage(e.target.files[0]);
            }
        }

        function handleImage(file) {
            if (!file.type.match('image.*')) {
                alert('请选择图片文件！');
                return;
            }

            const reader = new FileReader();
            reader.onload = e => {
                currentImage = new Image();
                currentImage.onload = startAnalysis;
                currentImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function startAnalysis() {
            // 显示分析页面
            home.style.display = 'none';
            analyzing.style.display = 'block';
            results.style.display = 'none';
            
            preview.src = currentImage.src;
            
            // 模拟分析过程
            const steps = ['分析面部特征...', '匹配相似明星...', '计算相似度...', '完成！'];
            let step = 0;
            
            const interval = setInterval(() => {
                if (step < steps.length) {
                    progress.textContent = steps[step];
                    step++;
                } else {
                    clearInterval(interval);
                    showResults();
                }
            }, 800);
        }

        function showResults() {
            // 选择明星池
            let pool = [];
            if (selectedGender === 'any') {
                const genders = ['male', 'female'];
                const randomGender = genders[Math.floor(Math.random() * genders.length)];
                pool = stars[randomGender];
            } else {
                pool = stars[selectedGender];
            }
            
            // 按相似度排序，最高的作为最像明星
            const sortedPool = [...pool].sort((a, b) => b.percent - a.percent);
            const mainResult = sortedPool[0];
            const otherResults = sortedPool.slice(1).slice(0, 3);
            
            // 显示结果
            analyzing.style.display = 'none';
            results.style.display = 'block';
            
            // 显示整体结果
            percent.textContent = mainResult.percent + '%';
            name.textContent = mainResult.name;
            overall.textContent = mainResult.overall;
            
            // 显示部位分析
            const featureIcons = {
                '眼睛': '👁️',
                '鼻子': '👃',
                '嘴唇': '👄',
                '脸型': '😊'
            };
            
            features.innerHTML = mainResult.features.map(feature => `
                <div class="feature-item">
                    <div class="feature-icon">${featureIcons[feature.part] || '✨'}</div>
                    <div class="feature-info">
                        <div class="feature-name">${feature.part}</div>
                        <div class="feature-desc">${feature.desc}</div>
                    </div>
                    <div class="feature-percent">${feature.similarity}%</div>
                </div>
            `).join('');
            
            // 显示其他结果
            others.innerHTML = otherResults.map(star => `
                <div class="small-card">
                    <div class="small-percent">${star.percent}%</div>
                    <div class="small-name">${star.name}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
