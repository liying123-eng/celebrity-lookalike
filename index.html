        function euclideanDistance(descriptor1, descriptor2) {
            let sum = 0;
            for (let i = 0; i < descriptor1.length; i++) {
                const diff = descriptor1[i] - descriptor2[i];
                sum += diff * diff;
            }
            return Math.sqrt(sum);
        }

        // 将距离转换为相似度百分比
        function distanceToSimilarity(distance) {
            // face-api.js 中，0.6 是通常的阈值，距离越小越相似
            // 距离范围大约是 0 到 1.5
            // 映射到 50-98% 的相似度
            const maxDistance = 1.2;
            const minDistance = 0.3;
            const normalizedDist = Math.max(0, Math.min(1, (distance - minDistance) / (maxDistance - minDistance)));
            const similarity = Math.round(98 - normalizedDist * 48);
            return Math.max(50, Math.min(98, similarity));
        }

                        // 脸型特征影响维度 64-95
                        else if (i < 96) {
                            if (celeb.features.face === 'vshape') value = Math.max(0.3, value + 0.15);
                            else if (celeb.features.face === 'round') value = Math.min(0.8, value - 0.1);
                        }
                        // 嘴巴特征影响维度 96-127
                        else {
                            if (celeb.features.mouth === 'big') value = Math.max(0.3, value + 0.15);
                            else if (celeb.features.mouth === 'small') value = Math.min(0.7, value - 0.1);
                        }
                    }
                    
                    descriptor[i] = value;
                }
                return descriptor;
            }
            
            // 找到最匹配的明星
            let bestMatch = celebrities[0];
            let minDistance = Infinity;
            
            celebrities.forEach(celeb => {
                const celebDescriptor = generateDescriptorFromName(celeb.name);
                const distance = euclideanDistance(userDescriptor, celebDescriptor);
                
                if (distance < minDistance) {
                    minDistance = distance;
                    bestMatch = celeb;
                }
            });
            
            const similarity = distanceToSimilarity(minDistance);
            
            return {
                ...bestMatch,
                similarity: similarity
            };
        }

        // 随机获取明星（备用方案）
        function getRandomCelebrity() {
            const randomIndex = Math.floor(Math.random() * celebrities.length);
            const similarity = Math.floor(Math.random() * 30) + 65; // 65-95
            return {
                ...celebrities[randomIndex],
                similarity: similarity
            };
        }

        // 显示结果
        function showResult(result) {
            document.getElementById('resultImage').src = result.image;
            document.getElementById('resultName').textContent = `你最像：${result.name}`;
            document.getElementById('similarity').textContent = `${result.similarity}%`;
            document.getElementById('resultDesc').textContent = result.desc;
            document.getElementById('result').style.display = 'block';
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('analyzeBtn').style.display = 'none';
            document.querySelector('.upload-area').style.display = 'none';
        }

        // 重置
        function reset() {
            currentImage = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('previewImage').src = '';
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('analyzeBtn').style.display = 'none';
            document.querySelector('.upload-area').style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
