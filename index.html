<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明星撞脸测试 - GitHub Pages版本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #ddd;
            margin-bottom: 2rem;
        }

        .gender-selector {
            margin: 2rem 0;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .gender-btn {
            background: transparent;
            color: white;
            border: 2px solid #ffd700;
            padding: 0.8rem 1.2rem;
            margin: 0.3rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .gender-btn.active {
            background: #ffd700;
            color: black;
        }

        .gender-btn:hover:not(.active) {
            background: rgba(255, 215, 0, 0.2);
        }

        .upload-area {
            border: 2px dashed #ffd700;
            border-radius: 15px;
            padding: 2rem;
            margin: 2rem 0;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        .upload-area:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateY(-5px);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            color: #aaa;
            font-size: 0.8rem;
        }

        #file-input {
            display: none;
        }

        .scan-container {
            display: none;
            margin: 2rem 0;
        }

        .user-photo {
            max-width: 250px;
            border-radius: 12px;
            margin-bottom: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .scan-line {
            height: 3px;
            background: #ffd700;
            box-shadow: 0 0 15px #ffd700;
            animation: scan 2s infinite linear;
            margin: 1rem auto;
            width: 80%;
            border-radius: 2px;
        }

        @keyframes scan {
            0% { transform: translateY(-50px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(50px); opacity: 0; }
        }

        .progress-text {
            font-size: 1rem;
            color: #ffd700;
            margin: 1rem 0;
        }

        .results-container {
            display: none;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            margin: 1rem 0;
        }

        .match-percent {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            margin: 1rem 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .star-name {
            font-size: 2rem;
            margin: 1rem 0;
        }

        .star-desc {
            color: #ddd;
            font-size: 1rem;
            line-height: 1.6;
            margin: 1rem 0;
        }

        .other-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .small-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s;
        }

        .small-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }

        .small-percent {
            font-size: 1.5rem;
            color: #ffd700;
            font-weight: bold;
        }

        .small-name {
            font-size: 1rem;
            margin: 0.5rem 0;
        }

        .btn {
            background: #ffd700;
            color: black;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 0.5rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .other-results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="home">
            <h1>🌟 明星撞脸测试</h1>
            <p class="subtitle">上传照片，发现你的明星脸</p>
            
            <div class="gender-selector">
                <div style="margin-bottom: 1rem;">选择匹配性别：</div>
                <button class="gender-btn active" data-gender="any">不限</button>
                <button class="gender-btn" data-gender="male">男生</button>
                <button class="gender-btn" data-gender="female">女生</button>
            </div>
            
            <div class="upload-area" id="upload-area">
                <div class="upload-icon">📸</div>
                <div class="upload-text">点击上传照片</div>
                <div class="upload-hint">支持 JPG/PNG 格式</div>
                <input type="file" id="file-input" accept="image/*">
            </div>
        </div>

        <!-- 分析页面 -->
        <div id="analyzing" class="scan-container">
            <img id="preview" class="user-photo" alt="预览">
            <div class="scan-line"></div>
            <div class="progress-text" id="progress">正在分析中...</div>
        </div>

        <!-- 结果页面 -->
        <div id="results" class="results-container">
            <div class="result-card">
                <div class="match-percent" id="percent">92%</div>
                <div class="star-name" id="name">肖战</div>
                <div class="star-desc" id="desc">你们都有着精致的五官和温暖的笑容，气质非常相似！</div>
            </div>
            
            <div class="other-results" id="others">
                <!-- 其他结果 -->
            </div>
            
            <button class="btn" id="retry">重新测试</button>
        </div>
    </div>

    <script>
        // 全局变量
        let selectedGender = 'any';
        let currentImage = null;
        
        // 明星数据库
        const stars = {
            male: [
                { name: '肖战', desc: '精致五官，温暖笑容，气质相似！', percent: 92 },
                { name: '王一博', desc: '冷峻外表，细腻情感，眼神有故事。', percent: 85 },
                { name: '易烊千玺', desc: '少年感十足，清秀面庞，超越年龄的成熟。', percent: 78 },
                { name: '白敬亭', desc: '温暖笑容，干净气质，邻家大男孩感觉。', percent: 72 }
            ],
            female: [
                { name: '迪丽热巴', desc: '异域风情，灵动眼神，独特魅力。', percent: 88 },
                { name: '杨幂', desc: '瓜子脸型，灵动大眼，甜美成熟韵味。', percent: 82 },
                { name: '刘亦菲', desc: '古典美人，清雅脱俗，仙女气质。', percent: 79 },
                { name: '赵丽颖', desc: '圆润脸型，清澈眼神，邻家女孩亲切感。', percent: 75 }
            ]
        };

        // DOM元素
        const home = document.getElementById('home');
        const analyzing = document.getElementById('analyzing');
        const results = document.getElementById('results');
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const progress = document.getElementById('progress');
        const percent = document.getElementById('percent');
        const name = document.getElementById('name');
        const desc = document.getElementById('desc');
        const others = document.getElementById('others');
        const retry = document.getElementById('retry');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 性别选择
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedGender = btn.dataset.gender;
                });
            });

            // 上传功能
            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFile);
            
            // 拖拽上传
            uploadArea.addEventListener('dragover', e => {
                e.preventDefault();
                uploadArea.style.background = 'rgba(255, 215, 0, 0.2)';
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = '';
            });
            
            uploadArea.addEventListener('drop', e => {
                e.preventDefault();
                uploadArea.style.background = '';
                if (e.dataTransfer.files.length > 0) {
                    handleImage(e.dataTransfer.files[0]);
                }
            });

            // 重新测试
            retry.addEventListener('click', () => {
                home.style.display = 'block';
                analyzing.style.display = 'none';
                results.style.display = 'none';
                fileInput.value = '';
                currentImage = null;
            });
        });

        function handleFile(e) {
            if (e.target.files.length > 0) {
                handleImage(e.target.files[0]);
            }
        }

        function handleImage(file) {
            if (!file.type.match('image.*')) {
                alert('请选择图片文件！');
                return;
            }

            const reader = new FileReader();
            reader.onload = e => {
                currentImage = new Image();
                currentImage.onload = startAnalysis;
                currentImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function startAnalysis() {
            // 显示分析页面
            home.style.display = 'none';
            analyzing.style.display = 'block';
            results.style.display = 'none';
            
            preview.src = currentImage.src;
            
            // 模拟分析过程
            const steps = ['分析面部特征...', '匹配相似明星...', '计算相似度...', '完成！'];
            let step = 0;
            
            const interval = setInterval(() => {
                if (step < steps.length) {
                    progress.textContent = steps[step];
                    step++;
                } else {
                    clearInterval(interval);
                    showResults();
                }
            }, 800);
        }

        function showResults() {
            // 选择明星池
            let pool = [];
            if (selectedGender === 'any') {
                const genders = ['male', 'female'];
                const randomGender = genders[Math.floor(Math.random() * genders.length)];
                pool = stars[randomGender];
            } else {
                pool = stars[selectedGender];
            }
            
            // 随机选择结果
            const mainResult = pool[Math.floor(Math.random() * pool.length)];
            const otherResults = pool.filter(s => s.name !== mainResult.name)
                                   .sort(() => 0.5 - Math.random())
                                   .slice(0, 3);
            
            // 显示结果
            analyzing.style.display = 'none';
            results.style.display = 'block';
            
            percent.textContent = mainResult.percent + '%';
            name.textContent = mainResult.name;
            desc.textContent = mainResult.desc;
            
            // 显示其他结果
            others.innerHTML = otherResults.map(star => `
                <div class="small-card">
                    <div class="small-percent">${star.percent}%</div>
                    <div class="small-name">${star.name}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
